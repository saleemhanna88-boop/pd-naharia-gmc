<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CAPD - מדריך קולי</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2e;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#38bdf8;
      --accent2:#22c55e;
      --danger:#ef4444;
      --warning:#f59e0b;
      --border:rgba(148,163,184,0.15);
      --shadow: 0 18px 50px rgba(0,0,0,0.55);
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top right, #162a50 0%, var(--bg) 60%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .app{
      width:min(1100px, 100%);
      background: rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    header{
      padding:22px;
      border-bottom:1px solid var(--border);
      background: linear-gradient(90deg, rgba(56,189,248,0.12), transparent);
    }

    h1{
      margin:0;
      font-size:1.5rem;
    }

    .subtitle{
      margin-top:8px;
      color:var(--muted);
      font-size:0.95rem;
      line-height:1.5;
    }

    main{
      padding:20px;
      display:grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap:16px;
    }

    @media(max-width:900px){
      main{ grid-template-columns:1fr; }
    }

    .panel{
      background: rgba(17,26,46,0.9);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }

    .badgeRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:12px;
    }

    .badge{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.02);
      font-size:0.85rem;
      color:var(--muted);
    }

    .badge strong{
      color:var(--text);
    }

    .current{
      background: rgba(15,23,42,0.9);
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      min-height:150px;
      display:flex;
      align-items:center;
      line-height:1.8;
      font-size:1.05rem;
    }

    .warningBox{
      margin-top:12px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(245,158,11,0.25);
      background: rgba(245,158,11,0.08);
      color:#fde68a;
      display:none;
      line-height:1.6;
    }

    .controls{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      flex:1;
      padding:14px;
      border-radius:14px;
      border:none;
      cursor:pointer;
      font-weight:700;
      font-size:1rem;
    }

    button:disabled{
      opacity:0.45;
      cursor:not-allowed;
    }

    .start{ background: linear-gradient(90deg, var(--accent), #60a5fa); color:#06111f; }
    .continue{ background: linear-gradient(90deg, var(--accent2), #86efac); color:#04120a; }
    .stop{ background: rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.35); color:#fecaca; }
    .next{ background: rgba(56,189,248,0.10); border:1px solid rgba(56,189,248,0.35); color:#bae6fd; }
    .prev{ background: rgba(148,163,184,0.10); border:1px solid rgba(148,163,184,0.35); color:#e2e8f0; }
    .replay{ background: rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.35); color:#fde68a; }

    .timeline{
      max-height:520px;
      overflow:auto;
      padding-top:10px;
      border-top:1px solid var(--border);
    }

    .stepItem{
      padding:10px;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.02);
      margin-bottom:10px;
      font-size:0.95rem;
      line-height:1.6;
    }

    .stepItem.active{
      border-color: rgba(56,189,248,0.7);
      background: rgba(56,189,248,0.08);
    }

    .stepItem.done{
      opacity:0.7;
    }
  </style>
</head>

<body>
<div class="app">
  <header>
    <h1>דיאליזה פרטוניאלית ידנית (CAPD)</h1>
    <div class="subtitle">זרימת עבודה שלב-שלב | עבודה סטרילית | חיבור/ניתוק בטוח</div>
  </header>

  <main>
    <section class="panel">
      <div class="badgeRow">
        <div class="badge">סטטוס: <strong id="status">מוכן</strong></div>
        <div class="badge">שלב: <strong id="counter">0 / 0</strong></div>
        <div class="badge">השהייה: <strong>10 שניות</strong></div>
      </div>

      <div class="current" id="currentText">
        <span style="color:var(--muted)">לחצי על "התחלת טיפול" כדי להתחיל.</span>
      </div>

      <div class="warningBox" id="pauseBox">
        ⏸️ עצירה נדרשת. לחץ על <strong>"המשך טיפול"</strong> כדי להמשיך.
      </div>

      <div class="controls">
        <button class="start" id="btnStart">▶ התחלת טיפול</button>

        <div class="row">
          <button class="prev" id="btnPrev" disabled>⬅ שלב קודם</button>
          <button class="next" id="btnNext" disabled>שלב הבא ➡</button>
        </div>

        <button class="continue" id="btnContinue" disabled>⏭ המשך טיפול</button>
        <button class="replay" id="btnReplay" disabled>🔁 הקרא שוב</button>
        <button class="stop" id="btnStop" disabled>⛔ עצור</button>
      </div>
    </section>

    <aside class="panel">
      <h3 style="margin-top:0;">רשימת שלבים</h3>
      <div class="timeline" id="timeline"></div>
    </aside>
  </main>
</div>

<script>
  const DELAY = 10000;

  const scriptText = `
שלב A: הכנת סביבת עבודה סגירת מיזוג, סגירת חלונות, סגירת דלת/וילון, רחיצת ידיים, לנקות משטח עבודה, פתיחת הציוד בצורה סטרילית, הנחת הציוד על המשטח הנקי,
שלב B: חיבור המטופל, עטיית מסיכת פנים על כולם, חיטוי ידיים, עטיית כפפות סטריליות, הסרת מכסה של סט הדיאליזה בצורה סטרילית וחיבור הקטטר טינקוף לסט,
שלב C: ניקוז, פתיחת קו ניקוז על ידי סיבוב הסוגר של מוצא קטטר, ניקוז מלא לשקית ניקוז, הורדת כפפות ולחזור למטופל לאחר סיום שלב הניקוז,
לאחר סיום השלב של הניקוז, סגירת הקו של המטופל על ידי סיבוב הסוגר של הקטטר עד הישמע קליק עדין, שקילת השקית,
שלב D: מילוי, שבירת הנצרה הירוקה שטיפת הסט במשך 5 שניות וסגירת קו הניקוז ע"י שני קלימים כחולים, פתיחת הקו של המטופל על ידי סיבוב הסוגר של הקטטר, מילוי לפי נפח בהוראה,
שלב E: סגירה וניתוק, רחצת ידיים, עטיית מסיכת פנים לכולם, הכנת ציוד לסגירת הקטטר כולל פקק חדש וסגירת הצינורות של השקית על ידי קלימים כחולים אחד על קו הניקוז והשני על קו המילוי, חיטוי ידיים, עטיית כפפות סטריליות, ניתוק המטופל בצורה סטרילית וסגירת הקטטר עם פקק סטרילי חדש, קיבוע הקטטר, תיעוד במערכת קמליון: רכיב UF בטבלת הוראות ומדדים
`.trim();

  const steps = scriptText.split(",").map(s => s.trim()).filter(Boolean);

  // עצירה לפני שלבים אלו:
  function isPausePoint(text){
    if (text.startsWith("לאחר סיום השלב של הניקוז")) return true;
    if (text.startsWith("שלב E")) return true;
    return false;
  }

  const statusEl = document.getElementById("status");
  const counterEl = document.getElementById("counter");
  const currentEl = document.getElementById("currentText");
  const pauseBox = document.getElementById("pauseBox");
  const timeline = document.getElementById("timeline");

  const btnStart = document.getElementById("btnStart");
  const btnContinue = document.getElementById("btnContinue");
  const btnPrev = document.getElementById("btnPrev");
  const btnNext = document.getElementById("btnNext");
  const btnReplay = document.getElementById("btnReplay");
  const btnStop = document.getElementById("btnStop");

  let currentIndex = -1;
  let timer = null;

  let running = false;
  let paused = false;

  function renderTimeline(){
    timeline.innerHTML = "";
    steps.forEach((t, i) => {
      const div = document.createElement("div");
      div.className = "stepItem";
      div.id = "step-" + i;
      div.textContent = (i+1) + ". " + t;
      timeline.appendChild(div);
    });
  }

  function updateUI(){
    counterEl.textContent = `${Math.max(currentIndex+1,0)} / ${steps.length}`;

    btnStop.disabled = !running;
    btnReplay.disabled = !running || currentIndex < 0;
    btnNext.disabled = !running;
    btnPrev.disabled = !running || currentIndex <= 0;

    pauseBox.style.display = paused ? "block" : "none";
    btnContinue.disabled = !paused;

    statusEl.textContent = paused ? "ממתין להמשך טיפול" : (running ? "מקריא..." : "מוכן");

    steps.forEach((_, i) => {
      const el = document.getElementById("step-" + i);
      el.classList.remove("active", "done");
      if (i < currentIndex) el.classList.add("done");
      if (i === currentIndex) el.classList.add("active");
    });
  }

  function stopTimer(){
    if (timer) clearTimeout(timer);
    timer = null;
  }

  function speak(text){
    return new Promise((resolve) => {
      if (!("speechSynthesis" in window)){
        alert("הדפדפן לא תומך בהקראה קולית.");
        resolve();
        return;
      }

      // חשוב מאוד במובייל:
      window.speechSynthesis.cancel();

      const u = new SpeechSynthesisUtterance(text);
      u.lang = "he-IL";
      u.rate = 1;
      u.pitch = 1;
      u.volume = 1;

      u.onend = () => resolve();
      u.onerror = () => resolve();

      window.speechSynthesis.speak(u);
    });
  }

  async function goTo(index){
    if (!running) return;

    stopTimer();
    paused = false;

    currentIndex = index;
    currentEl.textContent = steps[currentIndex];
    updateUI();

    await speak(steps[currentIndex]);

    if (!running) return;
    if (paused) return;

    timer = setTimeout(() => {
      autoNext();
    }, DELAY);
  }

  function autoNext(){
    if (!running) return;
    if (paused) return;

    const nextIndex = currentIndex + 1;

    if (nextIndex >= steps.length){
      running = false;
      paused = false;
      stopTimer();
      currentEl.innerHTML = "<strong>✅ הטיפול הסתיים בהצלחה.</strong>";
      updateUI();
      return;
    }

    const nextText = steps[nextIndex];

    if (isPausePoint(nextText)){
      paused = true;
      stopTimer();
      currentEl.innerHTML = `<span style="color:var(--muted)">ההקראה נעצרה. השלב הבא מוכן: <strong>${nextText}</strong></span>`;
      updateUI();
      return;
    }

    goTo(nextIndex);
  }

  async function start(){
    running = true;
    paused = false;
    currentIndex = 0;
    updateUI();
    await goTo(0);
  }

  function continueAfterPause(){
    if (!running) return;
    if (!paused) return;

    paused = false;
    updateUI();

    // ממשיכים לשלב הבא
    autoNext();
  }

  function stopAll(){
    running = false;
    paused = false;
    currentIndex = -1;
    stopTimer();
    window.speechSynthesis.cancel();
    currentEl.innerHTML = `<span style="color:var(--muted)">הטיפול נעצר. ניתן להתחיל מחדש.</span>`;
    updateUI();
  }

  btnStart.addEventListener("click", () => start());
  btnContinue.addEventListener("click", () => continueAfterPause());

  btnNext.addEventListener("click", () => {
    if (!running) return;
    if (currentIndex >= steps.length - 1) return;
    goTo(currentIndex + 1);
  });

  btnPrev.addEventListener("click", () => {
    if (!running) return;
    if (currentIndex <= 0) return;
    goTo(currentIndex - 1);
  });

  btnReplay.addEventListener("click", () => {
    if (!running || currentIndex < 0) return;
    goTo(currentIndex);
  });

  btnStop.addEventListener("click", () => stopAll());

  renderTimeline();
  updateUI();
</script>

</body>
</html>
