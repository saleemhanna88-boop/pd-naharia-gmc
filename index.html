<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CAPD - מדריך קולי</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 20px;
    }

    h1 { margin: 0; font-size: 22px; }
    h2 { margin: 8px 0 0 0; font-size: 15px; font-weight: normal; opacity: 0.9; }

    main {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      margin-bottom: 20px;
    }

    .step-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #1e3a8a;
    }

    .step-text {
      font-size: 20px;
      padding: 15px;
      background: #eef2ff;
      border-radius: 10px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status {
      margin-top: 10px;
      font-size: 16px;
      color: #0f172a;
    }
  </style>
</head>

<body>

<header>
  <h1>דיאליזה פרטוניאלית ידנית (CAPD)</h1>
  <h2>זרימת עבודה שלב-שלב | עבודה סטרילית | חיבור/ניתוק בטוח</h2>
</header>

<main>
  <div class="card">
    <div class="step-title">שלב נוכחי:</div>
    <div id="stepDisplay" class="step-text">המערכת תתחיל אוטומטית בעוד 3 שניות...</div>
    <div id="statusDisplay" class="status"></div>
  </div>
</main>

<script>
  const steps = [
    "שלב A: הכנת סביבת עבודה",
    "סגירת מיזוג",
    "סגירת חלונות",
    "סגירת דלת או וילון",
    "חיטוי ידיים",
    "משטח נקי ומסודר",
    "פתיחת הציוד בצורה סטרילית",
    "לוודא שהתמיסה חמה",

    "שלב B: חיבור המטופל CONNECT",
    "מסכה על כולם",
    "רחצת ידיים",
    "עטיית כפפות סטריליות",
    "הסרת מכסה בצורה סטרילית",
    "חיבור הקטטר טינקוף לסט",

    "שלב C: ניקוז DRAIN",
    "פתיחת קו ניקוז על ידי סיבוב הסוגר של מוצא קטטר",
    "ניקוז מלא לשקית ניקוז",
    "הורדת כפפות ולחזור למטופל לאחר סיום שלב הניקוז",

    "לאחר סיום השלב של הניקוז",
    "שקילת השקית",

    "שלב D: מילוי FILL",
    "פתיחת קו מילוי לאחר סיום ניקוז",
    "שבירת הנצרה הירוקה",
    "שטיפת הסט במשך חמש שניות",
    "סגירת קו הניקוז על ידי שני Clamp כחולים",
    "מילוי לפי נפח בהוראה",
    "מעקב אחר כאב או לחץ בבטן",

    "שלב E: סגירה וניתוק DISCONNECT",
    "רחצת ידיים",
    "מסיכת פנים לכולם",
    "הכנת ציוד לסגירת הקטטר כולל פקק חדש",
    "סגירת הצינורות של השקית על ידי קלימם כחולים אחד על קו הניקוז והשני על קו המילוי",
    "עטיית כפפות סטריליות",
    "ניתוק המטופל בצורה סטרילית",
    "סגירת הקטטר עם פקק סטרילי חדש",
    "קיבוע הקטטר",
    "תיעוד במערכת קמליון רכיב UF בטבלת הוראות ומדדים",
    "סיום התהליך"
  ];

  const PAUSE_AFTER_TEXT = "שקילת השקית";

  const stepDisplay = document.getElementById("stepDisplay");
  const statusDisplay = document.getElementById("statusDisplay");

  let currentStep = 0;
  let recognition = null;

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function speak(text) {
    return new Promise((resolve) => {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "he-IL";
      utterance.rate = 0.95;

      utterance.onend = () => resolve();
      utterance.onerror = () => resolve();

      window.speechSynthesis.speak(utterance);
    });
  }

  async function runGuide() {
    while (currentStep < steps.length) {
      const text = steps[currentStep];

      stepDisplay.textContent = text;
      statusDisplay.textContent = "מקריא...";

      await speak(text);

      // אם זה שלב השקילה - עצירה מיוחדת
      if (text === PAUSE_AFTER_TEXT) {
        statusDisplay.textContent = "המערכת עצרה. נא לומר בקול: תמשיך";

        const ok = await waitForVoiceCommandOrTimeout();
        if (!ok) {
          statusDisplay.textContent = "לא זוהתה פקודה. ממשיך אוטומטית...";
          await sleep(2000);
        } else {
          statusDisplay.textContent = "זוהתה פקודה: תמשיך. ממשיך...";
          await sleep(1000);
        }
      } else {
        // מעבר רגיל אחרי 10 שניות
        statusDisplay.textContent = "המתנה 10 שניות לשלב הבא...";
        await sleep(10000);
      }

      currentStep++;
    }

    stepDisplay.textContent = "המדריך הסתיים.";
    statusDisplay.textContent = "";
  }

  function waitForVoiceCommandOrTimeout() {
    return new Promise((resolve) => {

      // אם אין תמיכה בדפדפן בזיהוי קול
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        // fallback: ממשיך לבד אחרי 60 שניות
        setTimeout(() => resolve(false), 60000);
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = "he-IL";
      recognition.continuous = true;
      recognition.interimResults = true;

      let resolved = false;

      recognition.onresult = (event) => {
        let transcript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }

        transcript = transcript.trim().toLowerCase();

        if (transcript.includes("תמשיך") || transcript.includes("המשך")) {
          if (!resolved) {
            resolved = true;
            recognition.stop();
            resolve(true);
          }
        }
      };

      recognition.onerror = () => {
        if (!resolved) {
          resolved = true;
          resolve(false);
        }
      };

      recognition.onend = () => {
        // אם הזיהוי הסתיים בלי "תמשיך"
        if (!resolved) {
          resolved = true;
          resolve(false);
        }
      };

      recognition.start();

      // timeout 60 שניות
      setTimeout(() => {
        if (!resolved) {
          resolved = true;
          recognition.stop();
          resolve(false);
        }
      }, 60000);
    });
  }

  // התחלה אוטומטית אחרי 3 שניות
  setTimeout(() => {
    runGuide();
  }, 3000);

</script>

</body>
</html>
