<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מדריך קולי CAPD - דיאליזה פרטוניאלית ידנית</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    h2 {
      margin: 8px 0 0 0;
      font-size: 15px;
      font-weight: normal;
      opacity: 0.9;
    }

    main {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      margin-bottom: 20px;
    }

    .step-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #1e3a8a;
    }

    .step-text {
      font-size: 18px;
      padding: 10px;
      background: #eef2ff;
      border-radius: 10px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      margin: 8px;
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .start { background: #16a34a; color: white; }
    .stop { background: #dc2626; color: white; }
    .continue { background: #2563eb; color: white; }
    .prev { background: #64748b; color: white; }
    .next { background: #0f172a; color: white; }

    .disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .info {
      font-size: 14px;
      margin-top: 15px;
      color: #334155;
    }

    select {
      padding: 8px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
    }
  </style>
</head>

<body>

<header>
  <h1>דיאליזה פרטוניאלית ידנית (CAPD)</h1>
  <h2>זרימת עבודה שלב-שלב | עבודה סטרילית | חיבור/ניתוק בטוח</h2>
</header>

<main>
  <div class="card">
    <div class="step-title">שלב נוכחי:</div>
    <div id="stepDisplay" class="step-text">לחץ "התחל" להפעלת המדריך הקולי</div>
  </div>

  <div class="card">
    <button class="start" onclick="startGuide()">▶ התחל</button>
    <button class="stop" onclick="stopGuide()">⏹ עצור</button>
    <button id="continueBtn" class="continue disabled" onclick="manualContinue()" disabled>🔵 המשך טיפול</button>
    <br/>
    <button class="prev" onclick="prevStep()">⬅ חזור שלב</button>
    <button class="next" onclick="nextStep()">דלג שלב ➡</button>

    <div class="info">
      השהייה בין שלבים: <b>10 שניות</b><br/>
      שפת דיבור:
      <select id="voiceSelect"></select>
    </div>
  </div>
</main>

<script>
  // --- טקסט מחולק לפי פסיקים: כל פסיק = שלב חדש ---
  const steps = [
    // שלב A
    "שלב A: הכנת סביבת עבודה",
    "סגירת מיזוג",
    "סגירת חלונות",
    "סגירת דלת או וילון",
    "חיטוי ידיים",
    "משטח נקי ומסודר",
    "פתיחת הציוד בצורה סטרילית",
    "לוודא שהתמיסה חמה",

    // שלב B
    "שלב B: חיבור המטופל CONNECT",
    "מסכה על כולם",
    "רחצת ידיים",
    "עטיית כפפות סטריליות",
    "הסרת מכסה בצורה סטרילית",
    "חיבור הקטטר טינקוף לסט",

    // שלב C
    "שלב C: ניקוז DRAIN",
    "פתיחת קו ניקוז על ידי סיבוב הסוגר של מוצא קטטר",
    "ניקוז מלא לשקית ניקוז",
    "הורדת כפפות ולחזור למטופל לאחר סיום שלב הניקוז",

    // לאחר סיום הניקוז
    "לאחר סיום השלב של הניקוז",
    "שקילת השקית",

    // שלב D
    "שלב D: מילוי FILL",
    "פתיחת קו מילוי לאחר סיום ניקוז",
    "שבירת הנצרה הירוקה",
    "שטיפת הסט במשך חמש שניות",
    "סגירת קו הניקוז על ידי שני Clamp כחולים",
    "מילוי לפי נפח בהוראה",
    "מעקב אחר כאב או לחץ בבטן",

    // שלב E
    "שלב E: סגירה וניתוק DISCONNECT",
    "רחצת ידיים",
    "מסיכת פנים לכולם",
    "הכנת ציוד לסגירת הקטטר כולל פקק חדש",
    "סגירת הצינורות של השקית על ידי קלימם כחולים אחד על קו הניקוז והשני על קו המילוי",
    "עטיית כפפות סטריליות",
    "ניתוק המטופל בצורה סטרילית",
    "סגירת הקטטר עם פקק סטרילי חדש",
    "קיבוע הקטטר",
    "תיעוד במערכת קמליון רכיב UF בטבלת הוראות ומדדים",
    "סיום התהליך"
  ];

  // אינדקס השלב שבו צריך לעצור ולחכות לכפתור המשך
  // כאן העצירה אחרי "שקילת השקית"
  const pauseAfterIndex = steps.indexOf("שקילת השקית");

  let currentStep = 0;
  let isRunning = false;
  let timeoutHandle = null;
  let voices = [];
  let selectedVoice = null;

  const stepDisplay = document.getElementById("stepDisplay");
  const continueBtn = document.getElementById("continueBtn");
  const voiceSelect = document.getElementById("voiceSelect");

  function loadVoices() {
    voices = speechSynthesis.getVoices();
    voiceSelect.innerHTML = "";

    voices.forEach((v, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = `${v.name} (${v.lang})`;
      voiceSelect.appendChild(option);
    });

    // נסה לבחור עברית אם קיימת
    const hebrewIndex = voices.findIndex(v => v.lang.toLowerCase().includes("he"));
    if (hebrewIndex !== -1) {
      voiceSelect.value = hebrewIndex;
      selectedVoice = voices[hebrewIndex];
    } else {
      selectedVoice = voices[0] || null;
    }
  }

  speechSynthesis.onvoiceschanged = loadVoices;

  voiceSelect.addEventListener("change", () => {
    const idx = parseInt(voiceSelect.value);
    selectedVoice = voices[idx];
  });

  function speak(text) {
    return new Promise((resolve) => {
      if (!window.speechSynthesis) {
        alert("הדפדפן שלך לא תומך בדיבור קולי");
        resolve();
        return;
      }

      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "he-IL";

      if (selectedVoice) {
        utterance.voice = selectedVoice;
      }

      utterance.rate = 0.95;
      utterance.pitch = 1;

      utterance.onend = () => resolve();
      utterance.onerror = () => resolve();

      speechSynthesis.speak(utterance);
    });
  }

  async function runStep() {
    if (!isRunning) return;

    if (currentStep >= steps.length) {
      stepDisplay.textContent = "המדריך הסתיים.";
      isRunning = false;
      return;
    }

    const text = steps[currentStep];
    stepDisplay.textContent = text;

    await speak(text);

    // עצירה מיוחדת אחרי שקילת השקית
    if (currentStep === pauseAfterIndex) {
      pauseForManualContinue();
      return;
    }

    // המתנה 10 שניות
    timeoutHandle = setTimeout(() => {
      currentStep++;
      runStep();
    }, 10000);
  }

  function startGuide() {
    stopGuide();
    isRunning = true;
    currentStep = 0;
    continueBtn.disabled = true;
    continueBtn.classList.add("disabled");
    runStep();
  }

  function stopGuide() {
    isRunning = false;
    speechSynthesis.cancel();
    clearTimeout(timeoutHandle);
    timeoutHandle = null;

    continueBtn.disabled = true;
    continueBtn.classList.add("disabled");
  }

  function pauseForManualContinue() {
    isRunning = false;
    continueBtn.disabled = false;
    continueBtn.classList.remove("disabled");
    stepDisplay.textContent += " (ממתין ללחיצה על 'המשך טיפול')";
  }

  function manualContinue() {
    continueBtn.disabled = true;
    continueBtn.classList.add("disabled");

    isRunning = true;
    currentStep++;
    runStep();
  }

  function nextStep() {
    speechSynthesis.cancel();
    clearTimeout(timeoutHandle);

    if (currentStep < steps.length - 1) {
      currentStep++;
      isRunning = true;
      runStep();
    }
  }

  function prevStep() {
    speechSynthesis.cancel();
    clearTimeout(timeoutHandle);

    if (currentStep > 0) {
      currentStep--;
      isRunning = true;
      runStep();
    }
  }

  // טען קולות ברגע טעינת הדף
  window.onload = () => {
    loadVoices();
  };
</script>

</body>
</html>
